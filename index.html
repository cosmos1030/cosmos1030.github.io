<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doyoon Kim</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css?v=8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
</head>
<body>
    <header class="af-header">
        <div class="af-social" id="af-social"></div>
        <nav class="af-nav">
            <a href="index.html" class="af-active">About</a>
            <a href="news.html">News</a>
            <a href="publications.html">Publications</a>
            <a href="blog/">Posts</a>
        </nav>
    </header>

    <main class="af-main">
        <div class="af-container">

            <!-- Profile -->
            <div class="af-profile">
                <div class="af-profile-text">
                    <h1 class="af-name">Doyoon Kim</h1>
                    <div class="af-bio" id="af-bio"></div>
                </div>
                <div class="af-photo">
                    <img src="my_picture.jpg" alt="Doyoon Kim">
                </div>
            </div>

            <!-- News -->
            <section class="af-section">
                <div class="af-section-header">
                    <h2>News</h2>
                    <a href="news.html" class="af-see-all">see all →</a>
                </div>
                <div id="af-news"></div>
            </section>

            <!-- Publications -->
            <section class="af-section">
                <div class="af-section-header">
                    <h2>Publications</h2>
                    <a href="publications.html" class="af-see-all">see all →</a>
                </div>
                <div id="af-pubs"></div>
            </section>

            <!-- Recent Posts -->
            <section class="af-section">
                <div class="af-section-header">
                    <h2>Posts</h2>
                    <a href="blog/" class="af-see-all">see all →</a>
                </div>
                <div id="af-recent-posts"></div>
            </section>

        </div>
    </main>

    <script src="data/personal.js?v=2"></script>
    <script src="data/publications.js?v=2"></script>
    <script src="data/news.js"></script>
    <script src="data/posts.js"></script>

    <script>
        const p   = sitePersonalInfo;
        const pub = sitePublications;
        const { email, linkedin, github, scholar } = p.contact;

        // Social links
        document.getElementById('af-social').innerHTML = [
            `<a href="mailto:${email}" aria-label="Email"><i class="fas fa-envelope"></i></a>`,
            `<a href="${github}" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>`,
            `<a href="${linkedin}" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>`,
            `<a href="${scholar}" target="_blank" aria-label="Google Scholar"><i class="ai ai-google-scholar"></i></a>`,
        ].join('');

        // Bio
        document.getElementById('af-bio').innerHTML =
            p.about.map(para => `<p>${para}</p>`).join('') +
            `<p>Feel free to reach me via <a href="mailto:${email}">${email}</a>.</p>`;

        // News
        document.getElementById('af-news').innerHTML = siteNews.map(n => `
            <div class="af-news-item">
                <div class="af-news-date">${n.date}</div>
                <div class="af-news-text">${n.content}</div>
            </div>`
        ).join('');

        // Selected publications (published only)
        const selected = pub.filter(p => p.type === 'published');
        document.getElementById('af-pubs').innerHTML = selected.map(p => {
            const links = p.links.map(l =>
                `<a href="${l.url}" target="_blank">${l.type}</a>`
            ).join('');
            return `
                <div class="af-pub-item">
                    <div class="af-pub-body">
                        <span class="af-pub-title">${p.title}</span>
                        <div class="af-pub-authors">${p.authors}${p.note ? ` <em style="color:#999">${p.note}</em>` : ''}</div>
                        <div class="af-pub-venue">${p.status}</div>
                        ${links ? `<div class="af-pub-links">${links}</div>` : ''}
                    </div>
                </div>`;
        }).join('');

        // Recent posts (latest 3)
        const recent = [...sitePosts]
            .sort((a, b) => new Date(b.date) - new Date(a.date))
            .slice(0, 3);
        document.getElementById('af-recent-posts').innerHTML = recent.map(post => {
            const dateStr = new Date(post.date + 'T00:00:00').toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric'
            });
            return `
            <div class="af-news-item">
                <div class="af-news-date">${dateStr}</div>
                <div class="af-news-text"><a href="blog/post.html?slug=${post.slug}">${post.title}</a></div>
            </div>`;
        }).join('');
    </script>
</body>
</html>
