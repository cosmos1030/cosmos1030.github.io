<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Doyoon Kim</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="blog.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <!-- marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
    <div class="post-reading-progress" id="post-reading-progress" aria-hidden="true"></div>
    <header class="af-header">
        <div class="af-social" id="af-social"></div>
        <nav class="af-nav">
            <a href="../index.html">About</a>
            <a href="../news.html">News</a>
            <a href="../publications.html">Publications</a>
            <a href="index.html" class="af-active">Posts</a>
        </nav>
    </header>

    <main class="post-page">
        <div class="post-page-inner">
            <a href="index.html" class="post-back">
                <i class="fas fa-arrow-left"></i> Back to Posts
            </a>
            <div id="post-container">
                <p class="post-loading">Loading...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Doyoon Kim. All rights reserved.</p>
        </div>
    </footer>

    <script src="../data/personal.js?v=2"></script>
    <script src="interactions.js?v=3"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const { email, linkedin, github, scholar } = sitePersonalInfo.contact;
            document.getElementById('af-social').innerHTML = [
                `<a href="mailto:${email}" aria-label="Email"><i class="fas fa-envelope"></i></a>`,
                `<a href="${github}" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>`,
                `<a href="${linkedin}" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>`,
                `<a href="${scholar}" target="_blank" aria-label="Google Scholar"><i class="ai ai-google-scholar"></i></a>`,
            ].join('');
        });

        function parseFrontMatter(raw) {
            const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
            if (!match) return { meta: {}, body: raw };

            const meta = {};
            match[1].split('\n').forEach(line => {
                const colon = line.indexOf(':');
                if (colon === -1) return;
                const key = line.slice(0, colon).trim();
                let value = line.slice(colon + 1).trim();
                if (value.startsWith('[') && value.endsWith(']')) {
                    value = value.slice(1, -1).split(',').map(v => v.trim().replace(/^["']|["']$/g, ''));
                }
                meta[key] = value;
            });

            return { meta, body: match[2] };
        }

        // Protect math from marked, then re-inject KaTeX output
        function renderWithMath(markdown) {
            const stash = [];

            const stashed = markdown
                .replace(/\{\{interactive:([a-z0-9-]+)\}\}/gi, (_, type) =>
                    `<div class="interactive-demo" data-demo="${type}"></div>`
                )
                .replace(/\$\$([\s\S]*?)\$\$/g, (_, math) => {
                    stash.push({ display: true, math: math.trim() });
                    return `@@MATH${stash.length - 1}@@`;
                })
                .replace(/\$([^\$\n]+?)\$/g, (_, math) => {
                    stash.push({ display: false, math: math.trim() });
                    return `@@MATH${stash.length - 1}@@`;
                });

            let html = marked.parse(stashed);

            html = html.replace(/@@MATH(\d+)@@/g, (_, i) => {
                const { display, math } = stash[parseInt(i)];
                try {
                    return katex.renderToString(math, { displayMode: display, throwOnError: false });
                } catch (e) {
                    return `<span class="math-error">${math}</span>`;
                }
            });

            // Rebase relative image paths so they resolve from blog/post.html
            // (VS Code preview resolves from blog/posts/, site resolves from blog/)
            html = html.replace(/<img([^>]*)\ssrc="(?!http|\/|data:)([^"]+)"/g,
                (_, attrs, src) => `<img${attrs} src="posts/${src}"`);

            return html;
        }

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const container = document.getElementById('post-container');

            if (!slug) {
                container.innerHTML = '<p class="post-error">No post specified.</p>';
                return;
            }

            try {
                const res = await fetch(`posts/${slug}.md`);
                if (!res.ok) throw new Error(`${res.status}`);
                const raw = await res.text();
                const { meta, body } = parseFrontMatter(raw);

                document.title = `${meta.title || slug} - Doyoon Kim`;

                const date = meta.date
                    ? new Date(meta.date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
                    : '';

                const tags = Array.isArray(meta.tags)
                    ? meta.tags.map(t => `<span class="post-tag">${t}</span>`).join('')
                    : '';
                const category = meta.category || 'Uncategorized';

                const content = renderWithMath(body);

                container.innerHTML = `
                    <div class="post-layout">
                        <aside class="post-toc" aria-label="Table of contents">
                            <div class="post-toc-inner">
                                <div class="post-toc-title">On this page</div>
                                <nav id="post-toc-nav"></nav>
                            </div>
                        </aside>
                        <article class="post-article">
                            <div class="post-meta">
                                <a href="index.html?category=${encodeURIComponent(category)}" class="post-category">${category}</a>
                                <div class="post-tags">${tags}</div>
                                <h1>${meta.title || slug}</h1>
                                <span class="post-date">${date}</span>
                            </div>
                            <hr class="post-divider">
                            <div class="post-content">${content}</div>
                        </article>
                    </div>
                `;
                initializeInteractivePost(container, slug);
            } catch (e) {
                container.innerHTML = `<p class="post-error">Could not load post "${slug}".</p>`;
            }
        }

        // Wait for KaTeX and marked to be ready
        window.addEventListener('load', loadPost);
    </script>
</body>
</html>
