<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts — Doyoon Kim</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../styles.css?v=8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    <link rel="stylesheet" href="blog.css?v=2">
</head>
<body>
    <header class="af-header">
        <div class="af-social" id="af-social"></div>
        <nav class="af-nav">
            <a href="../index.html">About</a>
            <a href="../news.html">News</a>
            <a href="../publications.html">Publications</a>
            <a href="index.html" class="af-active">Posts</a>
        </nav>
    </header>

    <main class="af-main">
        <div class="af-container">
            <section class="af-section" style="margin-top:1rem">
                <h2>Posts</h2>
                <div class="post-category-filter" id="category-filter" aria-label="Filter posts by category"></div>
                <div id="posts-list"></div>
            </section>
        </div>
    </main>

    <script src="../data/personal.js?v=2"></script>
    <script src="../data/posts.js"></script>
    <script>
        try {
            const { email, linkedin, github, scholar } = sitePersonalInfo.contact;
            document.getElementById('af-social').innerHTML = [
                `<a href="mailto:${email}" aria-label="Email"><i class="fas fa-envelope"></i></a>`,
                `<a href="${github}" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>`,
                `<a href="${linkedin}" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>`,
            `<a href="${scholar}" target="_blank" aria-label="Google Scholar"><i class="ai ai-google-scholar"></i></a>`,
            ].join('');
        } catch(e) {}

        const list = document.getElementById('posts-list');
        const filter = document.getElementById('category-filter');
        const categories = ['Machine Learning Acceleration', 'Optimization', 'Reinforcement Learning'];
        const requestedCategory = new URLSearchParams(window.location.search).get('category');
        let activeCategory = categories.includes(requestedCategory) ? requestedCategory : 'All';

        if (!sitePosts || sitePosts.length === 0) {
            list.innerHTML = '<p style="color:#888;padding:1rem 0">No posts yet.</p>';
        } else {
            const categoryRank = Object.fromEntries(categories.map((category, index) => [category, index]));
            const sorted = [...sitePosts].sort((a, b) =>
                new Date(b.date) - new Date(a.date)
                || (categoryRank[a.category] ?? 999) - (categoryRank[b.category] ?? 999)
                || (b.order ?? -1) - (a.order ?? -1)
                || a.title.localeCompare(b.title)
            );

            function renderCategoryFilter() {
                filter.innerHTML = ['All', ...categories].map(category => `
                    <button
                        type="button"
                        class="post-category-button${category === activeCategory ? ' active' : ''}"
                        data-category="${category}"
                        aria-pressed="${category === activeCategory}"
                    >${category}</button>
                `).join('');
            }

            function renderPosts() {
                const visiblePosts = activeCategory === 'All'
                    ? sorted
                    : sorted.filter(post => post.category === activeCategory);

                if (visiblePosts.length === 0) {
                    list.innerHTML = `<div class="post-category-empty">No posts in ${activeCategory} yet.</div>`;
                    return;
                }

                list.innerHTML = visiblePosts.map(post => {
                const dateStr = new Date(post.date + 'T00:00:00').toLocaleDateString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });
                const tags = (post.tags || []).map(t => `<span class="af-post-tag">${t}</span>`).join('');
                return `
                <div class="af-post-item">
                    <div class="af-post-date">${dateStr}</div>
                    <div class="af-post-body">
                        <div class="af-post-category">${post.category || 'Uncategorized'}</div>
                        <a href="post.html?slug=${post.slug}" class="af-post-title">${post.title}</a>
                        ${post.description ? `<div class="af-post-desc">${post.description}</div>` : ''}
                        <div class="af-post-tags">${tags}</div>
                    </div>
                </div>`;
                }).join('');
            }

            filter.addEventListener('click', event => {
                const button = event.target.closest('[data-category]');
                if (!button) return;
                activeCategory = button.dataset.category;
                const url = new URL(window.location.href);
                if (activeCategory === 'All') {
                    url.searchParams.delete('category');
                } else {
                    url.searchParams.set('category', activeCategory);
                }
                window.history.replaceState({}, '', url);
                renderCategoryFilter();
                renderPosts();
            });

            renderCategoryFilter();
            renderPosts();
        }
    </script>
</body>
</html>
